# MJAgency observability stack — merge overlay for docker-compose.yml
#
# Usage (dev):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml --profile dev up -d
#
# Services:
#   prometheus   — scrapes all 12 agency apps at /api/metrics (port 9090)
#   loki         — log aggregation backend (port 3100)
#   promtail     — Docker log shipper with agency_id label extraction (port 9080)
#   tempo        — distributed tracing backend, OTLP receiver (port 3200 + 4318 + 4317)
#   grafana      — dashboards for metrics, logs, and traces (port 3001 on host)
#
# Security: ALL host port bindings use 127.0.0.1 — no LAN exposure (T-01-401)
# Grafana anonymous access is read-only on loopback only.

services:

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev

  loki:
    image: grafana/loki:3.3.1
    restart: unless-stopped
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    profiles:
      - dev

  promtail:
    image: grafana/promtail:3.3.1
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    ports:
      - "127.0.0.1:9080:9080"
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    profiles:
      - dev

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"    # HTTP query
      - "127.0.0.1:4318:4318"    # OTLP HTTP receiver (matches OTEL_EXPORTER_OTLP_ENDPOINT)
      - "127.0.0.1:4317:4317"    # OTLP gRPC receiver
    command: -config.file=/etc/tempo/tempo.yml
    profiles:
      - dev

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./infra/grafana/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # 127.0.0.1:3001 on host → avoids collision with Next.js dev server on 3000
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    profiles:
      - dev

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
