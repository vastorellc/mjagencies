# infra/pgbackrest/postgresql.archive.conf
# Postgres archive configuration fragment for continuous WAL push to R2.
#
# INSTRUCTIONS:
#   Append to /etc/postgresql/17/main/postgresql.conf during VPS provisioning.
#   Do NOT commit to a postgresql.conf — this is a fragment that adds archive_mode +
#   archive_command only. A server restart is required after editing postgresql.conf.
#
# After appending:
#   1. Ensure pgBackRest config is deployed: /etc/pgbackrest/pgbackrest.conf
#   2. Initialize the stanza (first time only):
#        pgbackrest --stanza=postgres-main stanza-create
#   3. Restart Postgres:
#        sudo systemctl restart postgresql
#   4. Verify WAL archiving:
#        pgbackrest --stanza=postgres-main check
#
# WAL archiving provides RPO ≤ 1h (archive_timeout=60s bounds any sub-60s data loss).
# Combined with the 3-tier backup schedule, all recovery targets within the retention
# bands can be satisfied via PITR.

archive_mode = on
archive_command = 'pgbackrest --stanza=postgres-main --config=/etc/pgbackrest/pgbackrest.conf archive-push %p'
archive_timeout = 60
max_wal_senders = 3
wal_level = replica
